# docker-compose.yml
services:
  flask-app:
    build: ./flask-app
    networks:
      - proxy-network

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    depends_on:
      - flask-app
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge